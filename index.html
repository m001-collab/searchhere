  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {

      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    
    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      padding: 40px;
    }
    
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }
    
    .subtitle {
      color: #666;
      margin-bottom: 25px;
      font-size: 14px;
    }
    
    .search-wrapper {
      position: relative;
      margin-bottom: 30px;
      margin-top: -20px;
    }
    
    #search {
      width: 100%;
      padding: 14px 16px;
      font-size: 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      transition: all 0.3s ease;
      font-family: inherit;
    }
    
    #search:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .results-info {
      color: #999;
      font-size: 13px;
      margin-bottom: 15px;
      min-height: 20px;
    }
    
    #results {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .card {
      background: #f8f9fa;
      border: 1px solid #e9ecef;
      padding: 18px;
      border-radius: 8px;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    
    .card:hover {
      background: #fff;
      border-color: #667eea;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
      transform: translateY(-2px);
    }
    
    .card-title {
      text-decoration: none;
      color: #667eea;
      font-weight: 700;
      font-size: 18px;
      display: block;
      margin-bottom: 8px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    .card-title:hover {
      color: #764ba2;
      text-decoration: underline;
    }
    
    .card-content {
      color: #666;
      font-size: 13px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 8px;
    }
    
    .card-url {
      color: #999;
      font-size: 12px;
      word-break: break-all;
    }
    
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }
    
    .empty-state svg {
      width: 60px;
      height: 60px;
      margin-bottom: 12px;
      opacity: 0.3;
    }
    
    .loading {
      text-align: center;
      color: #999;
      padding: 20px;
    }
    
    .highlight {
      background: #fffacd;
      font-weight: 500;
    }
    
    .hidden {
      display: none;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    
    .header-content {
      flex: 1;
    }
    
    .logo {
      width: 100px;
      height: auto;
    }
    
    .logo img {
      width: 130%;
      height: auto;
      /* margin-left: -20px; */
      margin-top: -40px; 
      margin-bottom: -20px; 
   
    }
  </style>
</head>

function display(list) {
  const container = document.getElementById("results");
  container.innerHTML = "";

  list.forEach(p => {
    container.innerHTML += `
      <div class="card">
        <a href="${p.url}" target="_blank">${p.title}</a>
      </div>
    `;
  });
}

document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  const resultsContainer = document.getElementById("results");

  if (q.trim().length > 0) {
    const filtered = pages.filter(p =>
      p.title.toLowerCase().includes(q)
    );
    display(filtered);
    resultsContainer.classList.remove("hidden");
  } else {
    resultsContainer.innerHTML = "";
    resultsContainer.classList.add("hidden");
  }
});
