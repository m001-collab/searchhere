<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tile Rescue Docs 🔍</title>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      font-size: 18px;
      max-width: 860px;
      margin: 0 auto;
      padding: 28px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.22);
      padding: 48px 52px;
    }

    h1 {
      color: #1a1a2e;
      margin-bottom: 6px;
      font-size: 38px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: #555;
      margin-bottom: 36px;
      font-size: 17px;
      line-height: 1.5;
    }

    .search-wrapper {
      position: relative;
      margin-bottom: 32px;
    }

    #search {
      width: 100%;
      padding: 18px 22px;
      font-size: 20px;
      border: 3px solid #c4c8e8;
      border-radius: 10px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      font-family: inherit;
      color: #1a1a2e;
      background: #f9faff;
    }

    #search::placeholder {
      color: #aaa;
    }

    #search:focus {
      outline: none;
      border-color: #5560cc;
      box-shadow: 0 0 0 4px rgba(85, 96, 204, 0.14);
      background: #fff;
    }

    #results {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: #f7f8ff;
      border: 2px solid #e2e5f5;
      border-left: 6px solid #667eea;
      padding: 22px 26px;
      border-radius: 10px;
      transition: box-shadow 0.2s ease, border-color 0.2s ease;
      cursor: pointer;
    }

    .card:hover {
      background: #fff;
      border-color: #5560cc;
      border-left-color: #5560cc;
      box-shadow: 0 6px 24px rgba(85, 96, 204, 0.16);
    }

    .card a {
      text-decoration: none;
      color: #2b4aaf;
      font-weight: 700;
      font-size: 20px;
      display: block;
      line-height: 1.4;
    }

    .card a:hover {
      color: #1a2e7a;
      text-decoration: underline;
    }

    .hidden {
      display: none;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 36px;
    }

    .header-content {
      flex: 1;
    }

    .logo {
      width: 100px;
      height: auto;
    }

    .logo img {
      width: 130%;
      height: auto;
      margin-top: -40px;
      margin-bottom: -20px;
    }

    @media (max-width: 600px) {
      .container { padding: 32px 24px; }
      h1 { font-size: 30px; }
      #search { font-size: 18px; }
      .card a { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-content">
        <h1>Search Docs 🔍</h1>
        <p class="subtitle">Searching through Confluence pages</p>
      </div>
      <div class="logo"><img src="tile rescue logo.png" alt=""></div>
    </div>
    <div class="search-wrapper">
      <input 
        id="search" 
        type="text" 
        placeholder="Search pages and content..." 
        autocomplete="off"
        spellcheck="false"
      />
    </div>
    
    <div id="results" class="hidden"></div>
  </div>

<script src="pages.js"></script>
<script>

const normalizedPages = pages.map(p => ({
  ...p,
  tags: (p.tags || []).flatMap(t => t.split(/\s+/).map(s => s.replace(/^#/, '')).filter(Boolean))
}));

const fuse = new Fuse(normalizedPages, {
  keys: ['title', 'tags'],
  threshold: 0.3,
  ignoreLocation: true,
  minMatchCharLength: 3,
});

function consonants(str) {
  return str.toLowerCase().replace(/[^bcdfghjklmnpqrstvwxyz]/g, '');
}

function consonantMatch(token, page) {
  const tc = consonants(token);
  if (tc.length < 3) return false;
  const words = [...page.title.split(/\s+/), ...page.tags];
  return words.some(w => consonants(w) === tc);
}

function display(list) {
  const container = document.getElementById("results");
  container.innerHTML = "";

  list.forEach(p => {
    container.innerHTML += `
      <div class="card">
        <a href="${p.url}" target="_blank">${p.title}</a>
      </div>
    `;
  });
}

document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.trim();
  const resultsContainer = document.getElementById("results");

  if (q.length > 0) {
    const tokens = q.split(/\s+/).map(t => t.replace(/^#/, '')).filter(Boolean);
    const seen = new Set();
    const filtered = [];
    for (const token of tokens) {
      for (const result of fuse.search(token)) {
        if (!seen.has(result.item.url)) {
          seen.add(result.item.url);
          filtered.push(result.item);
        }
      }
      for (const page of normalizedPages) {
        if (!seen.has(page.url) && consonantMatch(token, page)) {
          seen.add(page.url);
          filtered.push(page);
        }
      }
    }
    display(filtered);
    resultsContainer.classList.remove("hidden");
  } else {
    resultsContainer.innerHTML = "";
    resultsContainer.classList.add("hidden");
  }
});
</script>
</body>
</html>
